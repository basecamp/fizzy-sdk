version: 2
updates:
  - package-ecosystem: gomod
    directory: /go
    schedule:
      interval: weekly
    groups:
      go-deps:
        patterns: ["*"]
    cooldown:
      default-days: 10

  - package-ecosystem: npm
    directory: /typescript
    schedule:
      interval: weekly
    groups:
      npm-deps:
        patterns: ["*"]
    cooldown:
      default-days: 10
    ignore:
      # TEMPORARY: openapi-typescript peer dep still pins typescript ^5.x.
      # Remove once openapi-typescript ships TS 6 support (tracking openapi-ts/openapi-typescript#2774).
      - dependency-name: typescript
        update-types: ["version-update:semver-major"]

  - package-ecosystem: bundler
    directory: /ruby
    schedule:
      interval: weekly
    groups:
      ruby-deps:
        patterns: ["*"]
    cooldown:
      default-days: 10

  - package-ecosystem: gradle
    directory: /kotlin
    schedule:
      interval: weekly
    groups:
      kotlin-deps:
        patterns: ["*"]
    cooldown:
      default-days: 10

  - package-ecosystem: swift
    directory: /swift
    schedule:
      interval: weekly
    cooldown:
      default-days: 10

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
    cooldown:
      default-days: 10
